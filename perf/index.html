<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>docx-preview benchmark</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: #0f1720;
      color: #e5edf5;
    }

    body {
      margin: 0;
      height: 100vh;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(251, 191, 36, 0.12), transparent 28%),
        linear-gradient(180deg, #111827 0%, #0b1220 100%);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      backdrop-filter: blur(10px);
      background: rgba(15, 23, 32, 0.72);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 600;
    }

    header pre {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.5;
      color: #cbd5e1;
    }

    #viewer {
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 20px;
    }

    #root {
      min-height: 100%;
    }

    #root .docx-wrapper {
      padding: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>docx-preview benchmark</h1>
    <pre id="status">Ready</pre>
  </header>
  <div id="viewer">
    <div id="styles"></div>
    <div id="root"></div>
  </div>
  <script src="/dist/docx-preview.js"></script>
  <script src="/perf/benchmark.js"></script>
</body>
</html>
